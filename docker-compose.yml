services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    # Apple Silicon 호환성 문제 방지
    platform: linux/arm64
    ports:
      - "3000:3000"
    volumes:
      # 로컬 소스코드 동기화
      - .:/app
      # 컨테이너 내의 node_modules 격리 (로컬과 빌드 환경 분리)
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    command: npm run dev
    # 컨테이너 내부 쉘 접속 권장 명령어: docker compose run --rm web sh
