name = "terminal-2"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

# Cloudflare 인증 관련 환경 변수, 배포 시 환경 설정 등을 이 영역에서 관리함
# [vars]
# NODE_ENV = "production"

# D1 데이터베이스 바인딩 설정
# 배포 전 pnpm run db:setup 등으로 ID를 획득 후 입력함
[[d1_databases]]
binding = "DB"
database_name = "terminal-2-db"
database_id = "" # TODO: wrangler d1 create terminal-2-db 명령어로 생성된 ID를 여기에 입력

# 정적 파일 에셋 위치 등 추가 설정 가능 (Next.js Cloudflare Pages 연동 시 필요)
# [site]
# bucket = "./.vercel/output/static"
